version: '3.8'

services:
  db:
    image: postgres:15
    container_name: transaction_ranking_db
    environment:
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: transaction_ranking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: transaction_ranking_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transaction_ranking_backend
    environment:
      DATABASE_URL: postgresql://transaction_user:secure_password@db:5432/transaction_ranking
      REDIS_URL: redis://redis:6379
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20
    container_name: transaction_ranking_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: transaction_ranking_network
